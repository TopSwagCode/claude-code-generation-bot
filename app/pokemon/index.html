<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Overview</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Pokemon Overview</h1>
        <p>Discover and explore all Pokemon using the PokeAPI</p>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="search-input" placeholder="Search Pokemon..." aria-label="Search Pokemon">
        </section>

        <section class="loading" id="loading" aria-live="polite">
            <div class="spinner"></div>
            <p>Loading Pokemon...</p>
        </section>

        <section class="pokemon-grid" id="pokemon-grid" role="grid" aria-label="Pokemon grid">
        </section>

        <section class="load-more-section" id="load-more-section">
            <button id="load-more-btn" class="load-more-btn">Load More Pokemon</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
