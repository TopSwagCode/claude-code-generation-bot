name: Generate site from plan

on:
  push:
    paths:
      - 'plan/**.md'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find plan file
        id: find
        run: |
          plan_file=$(find plan -maxdepth 2 -name "*.md" -type f | head -n 1)
          if [ -z "$plan_file" ]; then
            echo "No plan file found, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            slug=$(basename "$plan_file" .md)
            echo "Found plan: $plan_file (slug: $slug)"
            echo "plan_file=$plan_file" >> "$GITHUB_OUTPUT"
            echo "slug=$slug" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code
        if: steps.find.outputs.skip == 'false'
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Read,Write,Edit,Glob,Grep,Bash(mkdir:*),Bash(ls:*)"
          prompt: |
            You are a prototype builder for Energinet. Read the plan at
            `${{ steps.find.outputs.plan_file }}`.

            Prototype slug: `${{ steps.find.outputs.slug }}`

            ## Required pre-reading — Energinet brand
            Before writing any code, read `brand.md` at the repo root. It defines
            Energinet's voice, visual identity, palette, typography, and formatting
            rules. Every page you produce — the landing page AND the prototype —
            MUST follow those guidelines.

            Key rules distilled from `brand.md` (the file is authoritative — re-read
            it if anything below conflicts):

            **Logo** — Include the Energinet logo in the header of every page:
            `https://upload.wikimedia.org/wikipedia/commons/1/1f/Energinet_logo.svg`
            - Render via `<img>` with `alt="Energinet"`.
            - Size it so it fits the header cleanly: `height: 36px` to `48px`,
              `width: auto`. Never stretch, crop, or recolor it.
            - Always horizontal. Never combine it with other color treatments.
            - The logo links back to the landing page `../index.html` from
              prototypes, and to `index.html` from the landing page itself.

            **Colors** — use Energinet's palette via CSS custom properties:
            - Primary 01 (grøn) `#00A58D` — primary actions, accents, links
            - Primary 02 (mørk grøn) `#008A8B` — hover/active
            - Primary 04 (mørk blå-grøn) `#09505D` — headings, contrast surfaces
            - Sekundær 10 (mørk blå) `#293A4C` — body text
            - Sekundær 05 (gul) `#FFD424` — sparse highlights only (single words)
            - Sekundær 11 (rød) `#ce3e33` — ONLY for errors/negative states
            - Surface `#ffffff`, background `#f5faf9`, border `#d7e2e1`
            Hit WCAG AA contrast. Support `prefers-color-scheme: dark` tastefully
            if it fits — keep the green accent identical in both modes.

            **Typography** — Inter from Google Fonts as the DIN Next substitute.
            Use weights 300/400/500. Headings in UPPERCASE with Light (300) or
            Regular (400) weight and ~0.04em letter-spacing for the "let og
            luftigt" feel the designguide calls for.

            **Shapes & feel** — border-radius 2–4px (minimal). Generous whitespace.
            Clean, professional, Nordic-minimalist. No drop-shadow excess.

            **Language & voice** — Fagligt præcis, tilgængelig, trovaerdig. Mirror
            the plan's language (Danish if the plan is Danish). Avoid marketing
            puffery. Use correct Danish terms where applicable.

            ## What to build
            Create a new folder `app/${{ steps.find.outputs.slug }}/` containing a
            complete, self-contained static prototype that implements the plan.
            Plain HTML, CSS, and JavaScript only — no frameworks, no bundlers, no
            build step. The prototype's entry point must be
            `app/${{ steps.find.outputs.slug }}/index.html`, with assets in
            `styles.css` and `script.js` alongside it. Put the logo in the
            prototype header linking back to `../index.html`.

            ## Update the landing page
            After building the prototype, update `app/index.html` (create it if
            missing) so it serves as a branded landing page linking to every
            prototype folder under `app/`. Run `ls app/` to discover what already
            exists. Preserve links to existing prototypes and ADD a link to the
            new `${{ steps.find.outputs.slug }}` prototype. Give each entry a
            readable title derived from the slug and a short description.

            ## Technical constraints
            - Semantic HTML5 (`<header>`, `<main>`, `<nav>`, `<section>`). Accessible
              labels, alt text, focus states, `aria-*` where needed.
            - Responsive, mobile-first (flexbox/grid, no fixed container widths).
            - No inline styles, no inline event handlers. CSS in `styles.css`, JS
              in `script.js`.
            - Lean, idiomatic JS — `const`/`let`, no globals on `window`.
            - Subtle, performant transitions (transform/opacity). Respect
              `prefers-reduced-motion`.
            - Do not modify anything outside of `app/`.
            - Do not delete the plan file — the workflow handles that.
            - Do not touch other prototype folders beyond linking to them from the
              landing page.

      - name: Delete implemented plan
        if: steps.find.outputs.skip == 'false'
        run: rm -f "${{ steps.find.outputs.plan_file }}"

      - name: Commit and push
        if: steps.find.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Generate site from $(basename '${{ steps.find.outputs.plan_file }}')"
            git push
          fi
